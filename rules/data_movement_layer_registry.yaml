movement_layer_review_contract:
  must_identify:
    - movement_layer_category
    - tool_or_protocol_name
    - source_owner
    - destination_owner
    - data_classification
    - whether_external_recipient_is_involved
    - whether_manual_step_exists
    - canonical_client_or_recipient_id
    - route_or_destination_identifier
    - manifest_or_control_record
    - approval_gate
    - log_or_evidence_location
    - failure_or_recall_process
  must_flag:
    - manual_label_or_free_text_routing
    - missing_recipient_allowlist
    - mismatch_between_file_name_and_client_id
    - mismatch_between_folder_and_manifest
    - missing_delivery_confirmation
    - sensitive_data_in_unmanaged_layer
    - broad_external_sharing_link
    - unapproved_production_data_export
    - stale_route_or_partner_profile
    - missing_owner_for_service_account_or_job

