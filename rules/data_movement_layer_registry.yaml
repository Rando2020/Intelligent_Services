cross_layer_detection_keywords:
  verbs:
    - send
    - upload
    - download
    - export
    - share
    - publish
    - sync
    - replicate
    - deliver
    - push
    - pull
    - stage
    - copy
    - route
    - transfer
    - drop
    - ingest
    - extract
    - unload
    - subscribe
    - webhook
    - feed
    - stream
    - distribute
  objects:
    - file
    - folder
    - bucket
    - container
    - endpoint
    - route
    - API
    - queue
    - topic
    - report
    - dashboard
    - extract
    - table
    - view
    - share
    - subscription
    - manifest
    - SFTP
