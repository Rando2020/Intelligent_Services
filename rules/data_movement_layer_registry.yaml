      - wrong_recipient
      - wrong_folder
      - stale_partner_route
      - manual_label_mismatch
      - exposed_web_transfer_portal
      - overbroad_user_access
      - missing_delivery_confirmation
    required_checks:
      - recipient_allowlist
      - route_validation
      - canonical_client_id_validation
      - outbound_quarantine
