      - GoAnywhere MFT
      - Axway Managed File Transfer
      - Globalscape EFT
      - Fortra EFT
      - IBM Sterling File Gateway
      - IBM Sterling B2B Integrator
      - Cleo Integration Cloud
      - MFT
      - managed file transfer
