version: "0.1.0"
last_updated: "2026-05-28"

purpose: >
  Registry of data movement layers, transfer surfaces, outbound delivery systems,
  sharing tools, replication paths, and manual movement patterns that Intelligent Services
  agents should recognize when evaluating data governance, delivery, and compliance risk.

non_legal_advice_notice: >
  This registry supports operational risk detection and engineering review. It does not replace
  Legal, Privacy, Security, Compliance, Architecture, or operational owner approval.

core_rule: >
  Any system, tool, job, folder, route, share, API, queue, export, report, or manual action that moves,
  copies, exposes, publishes, shares, replicates, stages, or delivers governed data is part of the data
  movement control boundary.

interpretation_rules:
  - id: MOVE-INTERPRET-001
    name: Treat movement synonyms as control surfaces
    rule: >
      If project documentation mentions send, upload, download, export, share, publish, sync, replicate,
      deliver, push, pull, stage, copy, route, transfer, drop, ingest, extract, unload, subscribe,
      webhook, feed, stream, or distribute, evaluate the referenced layer as a data movement surface.

  - id: MOVE-INTERPRET-002
    name: Treat named tools and generic protocols equally
    rule: >
      The same review applies whether the layer is named as a vendor product, protocol, folder, cloud service,
      database feature, manual process, or homegrown script.

  - id: MOVE-INTERPRET-003
    name: Last-mile delivery is never out of scope
    rule: >
      If the business process ends when a file, dataset, report, feed, table, message, or API response reaches
      an external recipient, that final delivery step must be reviewed even if it is outside the application code.

  - id: MOVE-INTERPRET-004
    name: Manual movement is high risk by default
    rule: >
      Manual uploads, manual renaming, copied folders, drag-and-drop delivery, spreadsheet attachments,
      and human-selected recipients must be treated as elevated risk unless constrained by strong controls.

required_controls_for_any_movement_layer:
  - movement_owner
  - source_system
  - destination_system_or_recipient
  - data_classification
  - canonical_client_or_recipient_id
  - permitted_use
  - approval_status
  - access_control
  - secure_transport_or_storage
  - manifest_or_metadata_record
  - validation_or_reconciliation_check
  - logging_and_monitoring
  - retention_or_deletion_rule
  - failure_or_recall_process

